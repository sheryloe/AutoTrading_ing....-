<!DOCTYPE html>
<html lang="ko" data-theme="night">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automethemoney Pro | Cloud Dashboard</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: "Pretendard", sans-serif; background: #0b0f1a; color: #cbd5e1; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .pnl-plus { color: #10b981; font-weight: 800; }
        .pnl-minus { color: #f43f5e; font-weight: 800; }
    </style>
</head>
<body class="min-h-screen">

    <header class="sticky top-0 z-50 bg-[#0b0f1a]/90 backdrop-blur-md border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-left">
                <h1 class="text-2xl font-black italic text-white uppercase tracking-tighter">Automethemoney Pro</h1>
                <p class="text-[10px] text-primary font-bold mt-1 uppercase tracking-widest text-left">3월 16일부터 모델 구동 시작</p>
            </div>
            <div class="tabs tabs-boxed bg-slate-900 border border-white/10 p-1">
                <button class="tab tab-active px-6 font-bold" id="btn-leaderboard" onclick="switchTab('leaderboard')">Leaderboard</button>
                <button class="tab px-6 font-bold" id="btn-guide" onclick="switchTab('guide')">System Guide</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div id="tab-leaderboard" class="tab-content active space-y-8">
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="pnl-stats-grid">
                <div class="glass-panel p-6 rounded-2xl border-l-4 border-indigo-500">
                    <div class="text-[10px] font-bold text-slate-500 uppercase mb-1">Model A PnL</div>
                    <div class="text-2xl font-black text-white font-mono" id="stat-model-a">0.00%</div>
                </div>
                <div class="glass-panel p-6 rounded-2xl border-l-4 border-emerald-500 text-left">
                    <div class="text-[10px] font-bold text-slate-500 uppercase mb-1 text-left">Model B PnL</div>
                    <div class="text-2xl font-black text-white font-mono text-left" id="stat-model-b">0.00%</div>
                </div>
                <div class="glass-panel p-6 rounded-2xl border-l-4 border-amber-500 text-left">
                    <div class="text-[10px] font-bold text-slate-500 uppercase mb-1 text-left">Model C PnL</div>
                    <div class="text-2xl font-black text-white font-mono text-left" id="stat-model-c">0.00%</div>
                </div>
                <div class="glass-panel p-6 rounded-2xl border-l-4 border-cyan-500 text-left text-left">
                    <div class="text-[10px] font-bold text-slate-500 uppercase mb-1 text-left text-left">Model D PnL</div>
                    <div class="text-2xl font-black text-white font-mono text-left" id="stat-model-d">0.00%</div>
                </div>
            </div>

            <div class="glass-panel p-8 rounded-3xl">
                <h2 class="text-lg font-black text-white italic uppercase mb-8 tracking-widest">Equity Curve Analysis</h2>
                <div id="multi-model-chart" style="min-height: 400px;"></div>
            </div>

            <div class="glass-panel rounded-3xl overflow-hidden">
                <div class="p-6 border-b border-white/5">
                    <h2 class="text-lg font-black text-white italic uppercase">Daily Performance List</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="table w-full">
                        <thead class="bg-black/20 text-slate-500 text-[10px] uppercase tracking-widest text-left">
                            <tr>
                                <th class="py-5 pl-8 text-left">Date</th>
                                <th class="text-left">Model ID</th>
                                <th class="text-left">PnL (%)</th>
                                <th class="text-right">Net Profit (₩)</th>
                                <th class="text-center pr-8">Status</th>
                            </tr>
                        </thead>
                        <tbody id="pnl-table-body" class="font-mono text-sm divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-guide" class="tab-content space-y-12 py-6">
            <div class="max-w-5xl mx-auto space-y-16">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-center">
                    <a href="https://github.com/sheryloe/Automethemoney" class="glass-panel p-8 rounded-2xl hover:bg-white/5 transition-all group">
                        <i data-lucide="github" class="w-8 h-8 mx-auto mb-4 group-hover:scale-110"></i>
                        <h3 class="font-black text-white uppercase">Repository</h3>
                    </a>
                    <a href="https://github.com/sheryloe/Automethemoney/wiki" class="glass-panel p-8 rounded-2xl hover:bg-white/5 transition-all group text-center">
                        <i data-lucide="book-open" class="w-8 h-8 mx-auto mb-4 text-center group-hover:scale-110"></i>
                        <h3 class="font-black text-white uppercase text-center">Wiki Docs</h3>
                    </a>
                </div>
                
                <div class="glass-panel p-8 rounded-3xl" id="comments">
                    <script src="https://giscus.app/client.js"
                        data-repo="sheryloe/Automethemoney"
                        data-repo-id="R_kgDON7u0mg"
                        data-category="Announcements"
                        data-category-id="DIC_kwDON7u0ms4CnM1U"
                        data-mapping="pathname"
                        data-strict="0"
                        data-reactions-enabled="1"
                        data-emit-metadata="0"
                        data-input-position="bottom"
                        data-theme="transparent_dark"
                        data-lang="ko"
                        crossorigin="anonymous"
                        async>
                    </script>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // GitHub Actions가 치환하는 영역
        const URL = '{{SUPABASE_URL}}';
        const KEY = '{{SUPABASE_ANON_KEY}}';

        let _supabase;
        if (URL.startsWith('http')) {
            _supabase = supabase.createClient(URL, KEY);
        } else {
            console.error("❌ 설정 에러: 주소가 치환되지 않았습니다.");
        }

        async function fetchTradingData() {
            if (!_supabase) return;
            const { data, error } = await _supabase.from('trading_logs').select('*').order('date', { ascending: false });
            if (error) {
                console.error("❌ 데이터 로드 에러:", error.message);
                return;
            }

            const tbody = document.getElementById('pnl-table-body');
            tbody.innerHTML = '';
            const cumulative = { "Model A": 0, "Model B": 0, "Model C": 0, "Model D": 0 };
            const chartData = { "Model A": [], "Model B": [], "Model C": [], "Model D": [] };
            const dates = [];

            [...data].reverse().forEach(log => {
                cumulative[log.model_id] += (log.pnl_percent || 0);
                chartData[log.model_id].push(cumulative[log.model_id].toFixed(2));
                if (!dates.includes(log.date)) dates.push(log.date);
            });

            data.forEach(log => {
                tbody.innerHTML += `
                    <tr class="hover:bg-white/5 border-b border-white/5 text-left">
                        <td class="py-5 pl-8 opacity-50 text-left">${log.date}</td>
                        <td class="font-black text-white text-left">${log.model_id}</td>
                        <td class="${log.pnl_percent >= 0 ? 'pnl-plus' : 'pnl-minus'} text-left">${log.pnl_percent >= 0 ? '+' : ''}${log.pnl_percent}%</td>
                        <td class="text-right opacity-80 italic text-left">₩ ${log.net_profit_krw?.toLocaleString()}</td>
                        <td class="text-center pr-8"><span class="badge ${log.status === 'Win' ? 'badge-success' : 'badge-error'} badge-xs font-black">${log.status}</span></td>
                    </tr>
                `;
            });

            Object.keys(cumulative).forEach(m => {
                const el = document.getElementById(`stat-model-${m.split(' ')[1].toLowerCase()}`);
                if (el) el.innerText = cumulative[m].toFixed(2) + "%";
            });

            renderChart(dates, chartData);
        }

        function renderChart(dates, chartData) {
            const options = {
                series: Object.keys(chartData).map(m => ({ name: m, data: chartData[m] })),
                chart: { height: 400, type: 'line', toolbar: { show: false }, background: 'transparent', foreColor: '#64748b' },
                colors: ['#6366f1', '#10b981', '#f59e0b', '#06b6d4'],
                stroke: { curve: 'smooth', width: 3 },
                xaxis: { categories: dates, axisBorder: {show: false} },
                theme: { mode: 'dark' }
            };
            document.querySelector("#multi-model-chart").innerHTML = '';
            new ApexCharts(document.querySelector("#multi-model-chart"), options).render();
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(`tab-${id}`).classList.add('active');
            document.getElementById(`btn-${id}`).classList.add('tab-active');
            if (id === 'leaderboard') fetchTradingData();
        }

        fetchTradingData();
        setInterval(fetchTradingData, 60000);
    </script>
</body>
</html>
