services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_auto_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"
    ports:
      - "${APP_PORT:-8099}:${APP_PORT:-8099}"
    volumes:
      - ./${STATE_FILE:-state.json}:/app/${STATE_FILE:-state.json}
      - ./${MODEL_FILE:-model_online.json}:/app/${MODEL_FILE:-model_online.json}
      - ./${RUNTIME_SETTINGS_FILE:-runtime_settings.local.json}:/app/${RUNTIME_SETTINGS_FILE:-runtime_settings.local.json}
      - ./reports:/app/reports
    command: ["python", "web_app.py"]

  reporter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_auto_reporter
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - app
    environment:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"
      DASHBOARD_URL: "http://app:${APP_PORT:-8099}/api/dashboard"
      SNAPSHOT_SECONDS: "300"
      MID_REPORT_SECONDS: "7200"
      ROLLING_VALIDATION_DAYS: "30"
      REPORT_DIR: "/app/reports"
    volumes:
      - ./reports:/app/reports
    healthcheck:
      disable: true
    command: ["python", "scripts/dashboard_reporter.py"]
