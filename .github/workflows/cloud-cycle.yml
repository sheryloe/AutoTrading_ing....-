name: cloud-cycle

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

permissions:
  contents: write

concurrency:
  group: cloud-cycle
  cancel-in-progress: false

jobs:
  run-cycle:
    runs-on:
      - self-hosted
      - windows
      - x64
      - automethemoney
    timeout-minutes: 7

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run one batch cycle
        env:
          RUNNER_ROLE: self-hosted

          EXECUTION_TARGET: paper
          TRADE_MODE: paper
          ENABLE_AUTOTRADE: "true"
          ENABLE_LIVE_EXECUTION: "false"
          ENABLE_MEME_MARKET: "false"
          LIVE_ENABLE_MEME: "false"
          LIVE_ENABLE_CRYPTO: "false"
          LIVE_EXECUTION_ARMED: "false"
          BYBIT_READONLY_SYNC: "true"
          BYBIT_SECRET_SOURCE: github

          OPENAI_REVIEW_ENABLED: "false"
          GOOGLE_TREND_ENABLED: "false"

          SCAN_INTERVAL_SECONDS: "600"
          SIGNAL_COOLDOWN_MINUTES: "10"
          MODEL_AUTOTUNE_INTERVAL_HOURS: "168"

          BYBIT_SYMBOLS: BTCUSDT,ETHUSDT,SOLUSDT,ENAUSDT,XRPUSDT,BNBUSDT,DOGEUSDT,ADAUSDT,TRXUSDT
          BYBIT_MAX_POSITIONS: "8"
          MACRO_TREND_POOL_SIZE: "8"

          CRYPTO_UNIVERSE_MODE: fixed_symbols
          CRYPTO_DATA_SOURCE_ORDER: binance,bybit,coingecko
          CRYPTO_USE_BINANCE_DATA: "true"
          CRYPTO_USE_BYBIT_DATA: "true"
          CRYPTO_USE_COINGECKO_DATA: "true"
          CRYPTO_DERIV_DATA_ENABLED: "false"
          MACRO_UNIVERSE_SOURCE: exchange

          CRYPTO_AUTOTRADE_MODELS: A,B,C,D
          LIVE_CRYPTO_MODELS: A,B,C,D

          GIT_DAILY_REPORTS_ENABLED: "true"
          GIT_DAILY_REPORTS_AUTOCOMMIT: "true"
          GIT_DAILY_REPORTS_AUTOPUSH: "true"
          GIT_DAILY_REPORTS_PATH: docs/data/daily_pnl
          GIT_DAILY_REPORTS_BRANCH: main
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

          SUPABASE_SYNC_ENABLED: "true"
          SUPABASE_SYNC_STRICT: "true"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SERVICE_MASTER_KEY: ${{ secrets.SERVICE_MASTER_KEY }}

          BYBIT_API_KEY: ${{ secrets.BYBIT_API_KEY }}
          BYBIT_API_SECRET: ${{ secrets.BYBIT_API_SECRET }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

        run: python scripts/run_batch_cycle.py