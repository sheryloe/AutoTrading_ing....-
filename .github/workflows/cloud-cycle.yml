name: cloud-cycle

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  run-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run one batch cycle
        env:
          TRADE_MODE: paper
          ENABLE_AUTOTRADE: "true"
          ENABLE_MEME_MARKET: "false"
          LIVE_ENABLE_MEME: "false"
          LIVE_ENABLE_CRYPTO: "true"
          OPENAI_REVIEW_ENABLED: "false"
          GOOGLE_TREND_ENABLED: "false"
          SCAN_INTERVAL_SECONDS: "600"
          SIGNAL_COOLDOWN_MINUTES: "10"
          MODEL_AUTOTUNE_INTERVAL_HOURS: "168"
          BYBIT_SYMBOLS: BTCUSDT,ETHUSDT,SOLUSDT,XRPUSDT,BNBUSDT
          CRYPTO_AUTOTRADE_MODELS: A,B,C,D
          LIVE_CRYPTO_MODELS: A,B,C,D
          GIT_DAILY_REPORTS_ENABLED: "true"
          GIT_DAILY_REPORTS_AUTOCOMMIT: "true"
          GIT_DAILY_REPORTS_AUTOPUSH: "true"
          GIT_DAILY_REPORTS_BRANCH: main
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          SUPABASE_SYNC_ENABLED: "true"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          BYBIT_API_KEY: ${{ secrets.BYBIT_API_KEY }}
          BYBIT_API_SECRET: ${{ secrets.BYBIT_API_SECRET }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/run_batch_cycle.py
