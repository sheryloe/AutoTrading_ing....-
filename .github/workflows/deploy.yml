name: Deploy Dashboard (Official Flow)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. HTML 내의 플레이스홀더를 실제 비밀 키로 교체
      - name: Inject Secrets into HTML
        run: |
          if [ -f "docs/index.html" ]; then
            # 시크릿 이름을 사용자님의 환경(SUPABASE_SECRET_KEY)에 맞게 매핑
            sed -i "s|{{SUPABASE_URL}}|${{ secrets.SUPABASE_URL }}|g" docs/index.html
            sed -i "s|{{SUPABASE_ANON_KEY}}|${{ secrets.SUPABASE_SECRET_KEY }}|g" docs/index.html
            echo "✅ docs/index.html 치환 성공"
          else
            echo "❌ 에러: docs/index.html 파일을 찾을 수 없습니다!"
            exit 1
          fi

      # 2. 아티팩트 업로드 및 공식 배포
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
