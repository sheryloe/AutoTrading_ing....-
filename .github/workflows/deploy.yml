name: Deploy Dashboard (Official Flow)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 핵심: 치환이 안 되면 여기서 에러를 내도록 설계
      - name: Inject Secrets into HTML
        run: |
          # 파일 존재 여부 체크
          if [ ! -f "docs/index.html" ]; then
            echo "❌ docs/index.html 파일을 찾을 수 없습니다!"
            exit 1
          fi

          # 따옴표(")를 사용하여 공백이나 특수문자 대응
          sed -i "s|{{SUPABASE_URL}}|${{ secrets.SUPABASE_URL }}|g" docs/index.html
          sed -i "s|{{SUPABASE_ANON_KEY}}|${{ secrets.SUPABASE_ANON_KEY }}|g" docs/index.html
          
          # 치환 확인 (보안을 위해 첫 5글자만 출력)
          grep "const URL =" docs/index.html | cut -c 1-30

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
