name: Deploy Dashboard with Secrets

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 1. 명시적 권한 부여 (Exit Code 128 해결책)
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v3 -> v4 업데이트

      # 2. HTML 내의 플레이스홀더를 실제 비밀 키로 교체
      - name: Inject Secrets into HTML
        run: |
          # 파일 경로가 확실한지 체크 (에러 방지)
          if [ -f "docs/index.html" ]; then
            sed -i "s|{{SUPABASE_URL}}|${{ secrets.SUPABASE_URL }}|g" docs/index.html
            sed -i "s|{{SUPABASE_ANON_KEY}}|${{ secrets.SUPABASE_SECRET_KEY }}|g" docs/index.html
            echo "✅ Secrets injected successfully."
          else
            echo "❌ Error: docs/index.html not found!"
            exit 1
          fi

      # 3. GitHub Pages 배포 (v3 -> v4 업데이트)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
