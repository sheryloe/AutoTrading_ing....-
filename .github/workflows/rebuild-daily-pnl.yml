name: rebuild-daily-pnl

on:
  workflow_dispatch:
    inputs:
      from_day:
        description: UTC start day (YYYY-MM-DD)
        required: false
        default: "2026-03-28"
      to_day:
        description: UTC end day (YYYY-MM-DD), blank means today
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - "scripts/rebuild_daily_pnl.py"
      - "src/engine.py"
      - "src/data_sources.py"
      - "src/daily_reports.py"
      - "docs/daily-pnl.html"
      - ".github/workflows/rebuild-daily-pnl.yml"

permissions:
  contents: write

concurrency:
  group: rebuild-daily-pnl
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve replay window
        id: window
        shell: bash
        run: |
          FROM_DAY="${{ github.event.inputs.from_day || '2026-03-28' }}"
          TO_DAY="${{ github.event.inputs.to_day }}"
          if [ -z "$TO_DAY" ]; then
            TO_DAY="$(date -u +%F)"
          fi
          echo "from_day=$FROM_DAY" >> "$GITHUB_OUTPUT"
          echo "to_day=$TO_DAY" >> "$GITHUB_OUTPUT"

      - name: Rebuild daily PnL
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/rebuild_daily_pnl.py \
            --from "${{ steps.window.outputs.from_day }}" \
            --to "${{ steps.window.outputs.to_day }}" \
            --state-file /tmp/engine_state.json \
            --write-state \
            --write-supabase \
            --write-docs

      - name: Commit rebuilt docs artifacts
        shell: bash
        run: |
          if git diff --quiet -- docs/data/daily_pnl; then
            echo "No docs/data/daily_pnl changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/daily_pnl
          git commit -m "rebuild daily pnl artifacts"
          git push origin HEAD:main
